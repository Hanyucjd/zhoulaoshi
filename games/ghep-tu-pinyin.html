<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghép từ — Pinyin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Space+Mono:wght@400;700&family=Literata:wght@400;600&display=swap');
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Literata',serif; background:#F5F0E4; color:#221F1A;
    padding: 18px; min-height:100vh;
  }
  h1{ font-size:19px; margin:0 0 4px; }
  p.sub{ font-family:'Space Mono',monospace; font-size:12px; color:#514A3E; margin:0 0 16px; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .stat{ font-family:'Space Mono',monospace; font-size:12px; background:#ECE5D4; border:1px solid #CDC0A2; padding:6px 12px; border-radius:999px; }
  .board{ display:grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width:520px){ .board{ grid-template-columns: 1fr; } }
  .col-title{ font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#9C3626; margin-bottom:8px; }
  .card{
    display:block; width:100%; text-align:left; margin-bottom:10px;
    padding: 14px 16px; border:1px solid #CDC0A2; border-radius:4px; background:#fff;
    cursor:pointer; font-size:16px; transition: all .15s ease;
  }
  .card.hanzi{ font-family:'Noto Serif SC',serif; font-size:24px; }
  .card:hover{ border-color:#9C3626; }
  .card.selected{ border-color:#3F5063; box-shadow: 0 0 0 2px #3F5063 inset; }
  .card.correct{ background:#e7efe4; border-color:#5B7B5B; }
  .card.wrong{ background:#f4e2df; border-color:#9C3626; }
  .win{ display:none; text-align:center; margin-top:22px; font-family:'Space Mono',monospace; }
  .win.show{ display:block; }
  button.reset{
    font-family:'Space Mono',monospace; font-size:12px; text-transform:uppercase;
    background:#221F1A; color:#F5F0E4; border:none; padding:10px 18px; border-radius:3px; cursor:pointer; margin-top:10px;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>配对游戏 · Ghép từ với Pinyin</h1>
      <p class="sub">Chọn 1 chữ Hán bên trái, sau đó chọn Pinyin tương ứng bên phải.</p>
    </div>
    <div class="stat" id="score">Đúng: 0 / 8</div>
  </div>

  <div class="board">
    <div>
      <div class="col-title">汉字 · Chữ Hán</div>
      <div id="col-hanzi"></div>
    </div>
    <div>
      <div class="col-title">拼音 · Pinyin</div>
      <div id="col-pinyin"></div>
    </div>
  </div>

  <div class="win" id="win">
    <p>🎉 Hoàn thành! Bạn đã ghép đúng tất cả.</p>
    <button class="reset" onclick="startGame()">Chơi lại</button>
  </div>

<script>
  // Bộ từ mẫu — giáo viên có thể sửa danh sách này để đổi nội dung trò chơi
  const WORDS = [
    { hanzi: "你好", pinyin: "nǐ hǎo" },
    { hanzi: "谢谢", pinyin: "xiè xie" },
    { hanzi: "老师", pinyin: "lǎo shī" },
    { hanzi: "学生", pinyin: "xué shēng" },
    { hanzi: "朋友", pinyin: "péng yǒu" },
    { hanzi: "汉语", pinyin: "hàn yǔ" },
    { hanzi: "再见", pinyin: "zài jiàn" },
    { hanzi: "谢谢你", pinyin: "xiè xie nǐ" }
  ];

  let selectedHanzi = null;
  let correctCount = 0;
  let shuffledPinyin = [];

  function shuffle(arr){
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function startGame(){
    correctCount = 0;
    selectedHanzi = null;
    document.getElementById("win").classList.remove("show");
    document.getElementById("score").textContent = `Đúng: 0 / ${WORDS.length}`;

    const hanziCol = document.getElementById("col-hanzi");
    const pinyinCol = document.getElementById("col-pinyin");
    hanziCol.innerHTML = "";
    pinyinCol.innerHTML = "";

    shuffledPinyin = shuffle(WORDS);
    const shuffledHanzi = shuffle(WORDS);

    shuffledHanzi.forEach(w => {
      const btn = document.createElement("button");
      btn.className = "card hanzi";
      btn.textContent = w.hanzi;
      btn.dataset.hanzi = w.hanzi;
      btn.addEventListener("click", () => selectHanzi(btn, w));
      hanziCol.appendChild(btn);
    });

    shuffledPinyin.forEach(w => {
      const btn = document.createElement("button");
      btn.className = "card";
      btn.textContent = w.pinyin;
      btn.dataset.pinyin = w.pinyin;
      btn.addEventListener("click", () => selectPinyin(btn, w));
      pinyinCol.appendChild(btn);
    });
  }

  function selectHanzi(btn, w){
    if(btn.classList.contains("correct")) return;
    document.querySelectorAll(".card.hanzi").forEach(c => c.classList.remove("selected"));
    btn.classList.add("selected");
    selectedHanzi = { btn, word: w };
  }

  function selectPinyin(btn, w){
    if(!selectedHanzi || btn.classList.contains("correct")) return;
    if(selectedHanzi.word.hanzi === w.hanzi){
      selectedHanzi.btn.classList.remove("selected");
      selectedHanzi.btn.classList.add("correct");
      btn.classList.add("correct");
      correctCount++;
      document.getElementById("score").textContent = `Đúng: ${correctCount} / ${WORDS.length}`;
      selectedHanzi = null;
      if(correctCount === WORDS.length){
        document.getElementById("win").classList.add("show");
      }
    } else {
      btn.classList.add("wrong");
      setTimeout(() => btn.classList.remove("wrong"), 400);
    }
  }

  startGame();
</script>
</body>
</html>
